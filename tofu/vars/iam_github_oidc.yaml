- name: portfolio-website
  repos:
    - "harik8/hariprasad.dev:*"
  description: "IAM policy for GitHub OIDC role to access ${workspace}-portfolio-website S3 bucket"
  policy: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:PutObject*"],
          "Resource": ["arn:aws:s3:::${workspace}-portfolio-website/*"]
        },
        {
          "Effect": "Allow",
          "Action": ["s3:ListBucket"],
          "Resource": ["arn:aws:s3:::${workspace}-portfolio-website"]
        }
      ]
    }

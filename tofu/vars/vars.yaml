---
versions:
  cloudfront: v6.7.0
  ec2: v6.4.0
  ecs: v7.5.0
  efs: v2.2.0
  eks: v21.23.0
  eventbridge: v4.3.0
  iam: v6.6.1
  kms: v4.2.0
  lambda: v8.8.0
  rds_aurora: v10.2.0
  s3: v5.14.0
  security_group: v6.0.0
  vpc: v6.6.1

ec2:
  - name: ssm-proxy
    create: false
ecs:
  create: true
efs:
  create: false
eks:
  create: true
  cluster_version: 1.34
  sc:
    gp3: true
    efs: false
  fargate_profile:
    - name: "core-dns"
      selectors:
        - namespace: "kube-system"
          labels:
            "eks.amazonaws.com/component": "coredns"
iam:
  github_oidc:
    repos: ["harik8/manalpetti:*","harik8/hariprasad.dev:*","harik8/awsing:*"]
rds:
  psql:
    create: false
    instances:
      []
vpc:
  create: true
  cidr: 10.100.0.0/16
  nat_gateway:
    enable: true
    single: true
